# GoReleaser config — cross-compiled binaries + archives + checksums on tag push.
# https://goreleaser.com  (validate locally with `goreleaser check`)
version: 2

project_name: ncr

before:
  hooks:
    - go mod tidy

builds:
  - id: ncr
    binary: ncr
    main: .
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: ncr
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  draft: false
  prerelease: auto

# Publish a Homebrew formula to justinabrahms/homebrew-tap on each release, so
# `brew install justinabrahms/tap/ncr` works. Needs HOMEBREW_TAP_GITHUB_TOKEN (a
# token that can push to the tap repo) — set in the release workflow.
brews:
  - name: ncr
    directory: Formula # Homebrew 5.x only discovers formulae under Formula/
    repository:
      owner: justinabrahms
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/justinabrahms/ncr"
    description: "Read a pull request outside-in, following call paths — not alphabetical."
    license: MIT
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@users.noreply.github.com
    dependencies:
      - name: gh
    install: |
      bin.install "ncr"
    test: |
      system "#{bin}/ncr", "--version"
